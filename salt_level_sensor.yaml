esphome:
  name: waterontharder-sensor
  friendly_name: "Waterontharder Sensor"

esp8266:
  board: d1_mini

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  min_auth_mode: WPA2

# Enable logging
logger:

# Enable Home Assistant API
api:

# Enable OTA updates
ota:
  platform: esphome

# Enable Web server
web_server:
  port: 80

# Time synchronization
time:
  - platform: homeassistant
    id: homeassistant_time

# Text sensors
text_sensor:
  - platform: version
    name: "Salt Level Sensor ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "Salt Level Sensor IP"
    ssid:
      name: "Salt Level Sensor SSID"
    bssid:
      name: "Salt Level Sensor BSSID"

# Switches
switch:
  - platform: restart
    name: "Salt Level Sensor Restart"

# Sensors
sensor:
  - platform: uptime
    name: "Salt Level Sensor Uptime"

  - platform: wifi_signal
    name: "Salt Level Sensor WiFi Signal"
    update_interval: 60s
    filters:
      - lambda: return x * -1;
    unit_of_measurement: "dBm"

  - platform: ultrasonic
    trigger_pin: D1
    echo_pin: D2
    name: "Salt Level Percentage"
    update_interval: 6h
    accuracy_decimals: 1
    filters:
      - lambda: return max(0.0, (0.42 - x) * (100.0 / 0.42));
    unit_of_measurement: "%"
