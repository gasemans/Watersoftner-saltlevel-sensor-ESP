substitutions:
  device_name: "zoutlevelsensor"
  friendly_name: "Zout Level Sensor"

  # D1 Mini aliases. Voor ESP32-varianten later liever GPIO-nummers gebruiken.
  trigger_pin: "D1"
  echo_pin: "D2"

  # Afstanden in meters, gemeten vanaf de sensor.
  # empty_distance = afstand sensor -> zoutniveau wanneer bijna leeg
  # full_distance  = afstand sensor -> zoutniveau wanneer vol genoeg
  empty_distance: "0.505"
  full_distance: "0.080"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: gasemans.zoutlevelsensor
    version: "2.1"

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

time:
  - platform: homeassistant
    id: homeassistant_time

text_sensor:
  - platform: version
    name: "ESPHome Version"

  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    bssid:
      name: "Connected BSSID"

button:
  - platform: restart
    name: "Restart"

sensor:
  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: wifi_signal
    id: wifi_signal_db
    name: "WiFi Signal"
    update_interval: 60s
    unit_of_measurement: "dBm"
    device_class: signal_strength
    state_class: measurement
    accuracy_decimals: 0

  - platform: ultrasonic
    id: salt_distance
    trigger_pin: ${trigger_pin}
    echo_pin: ${echo_pin}
    name: "Salt Distance"
    update_interval: 6h
    timeout: 1.0m
    pulse_time: 10us
    unit_of_measurement: "m"
    device_class: distance
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1
      - clamp:
          min_value: ${full_distance}
          max_value: ${empty_distance}

  - platform: template
    id: salt_level_percentage
    name: "Salt Level Percentage"
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 6h
    lambda: |-
      const float distance = id(salt_distance).state;
      const float empty_distance = ${empty_distance};
      const float full_distance = ${full_distance};

      if (isnan(distance)) {
        return NAN;
      }

      const float percentage =
        (empty_distance - distance) * 100.0 / (empty_distance - full_distance);

      return max(0.0f, min(100.0f, percentage));

  - platform: template
    name: "WiFi Signal Quality"
    unit_of_measurement: "%"
    icon: "mdi:wifi"
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      const float rssi = id(wifi_signal_db).state;

      if (isnan(rssi)) {
        return NAN;
      }
      if (rssi <= -100.0f) {
        return 0.0f;
      }
      if (rssi >= -50.0f) {
        return 100.0f;
      }

      return 2.0f * (rssi + 100.0f);
