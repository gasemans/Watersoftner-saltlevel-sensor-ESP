esphome:
  name: zoutlevelsensor
  friendly_name: "zoutlevelsensor"
  project:
    name: gasemans.zoutlevelsensor
    version: "2.0"

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: false
  min_auth_mode: WPA2

logger:

api:

ota:
  platform: esphome

web_server:
  port: 80

time:
  - platform: homeassistant
    id: homeassistant_time

text_sensor:
  - platform: version
    name: "Salt Level Sensor ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "Salt Level Sensor IP"
    ssid:
      name: "Salt Level Sensor SSID"
    bssid:
      name: "Salt Level Sensor BSSID"

switch:
  - platform: restart
    name: "Salt Level Sensor Restart"

sensor:
  - platform: uptime
    name: "Salt Level Sensor Uptime"

  - platform: wifi_signal
    name: "Salt Level Sensor WiFi Signal"
    update_interval: 60s
    filters:
      - lambda: return x * -1;
    unit_of_measurement: "dBm"

  - platform: ultrasonic
    trigger_pin: D1
    echo_pin: D2
    name: "Salt Level Percentage"
    update_interval: 6h
    accuracy_decimals: 0
    filters:
      - lambda: return max(0.0, min(100.0, (0.505 - x) * (100.0 / 0.505)));
    unit_of_measurement: "%"
